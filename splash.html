<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_26 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_26" style="display:block;"><svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="sp-gradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1"></stop>
</lineargradient>
<filter height="140%" id="glow" width="140%" x="-20%" y="-20%">
<fegaussianblur result="blur" stddeviation="3"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
</defs>
<!-- Outer Glow Ring -->
<circle cx="50" cy="50" fill="none" opacity="0.3" r="45" stroke="url(#sp-gradient)" stroke-width="0.5">
<animate attributename="r" dur="3s" repeatcount="indefinite" values="45;48;45"></animate>
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.3;0.6;0.3"></animate>
</circle>
<!-- Main Circle Container -->
<circle cx="50" cy="50" fill="#0A0A0F" filter="url(#glow)" r="40" stroke="url(#sp-gradient)" stroke-width="2">
<animate attributename="stroke-width" dur="2s" repeatcount="indefinite" values="1.5;2.5;1.5"></animate>
</circle>
<!-- Monogram SP -->
<text dominant-baseline="middle" fill="url(#sp-gradient)" font-family="Sora, sans-serif" font-size="28" font-weight="900" style="letter-spacing: -1px;" text-anchor="middle" x="50%" y="54%">
    SP
  </text>
</svg></div><!-- STITCH_SVG_END:ANIMATION_26 -->
</body>
</html>
